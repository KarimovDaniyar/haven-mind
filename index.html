<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, initial-scale=1.0" />
    <title>Vault — A Thinking Environment</title>
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (theme === 'light') {
          // do nothing, default is light
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <meta name="description" content="A premium desktop productivity app for focused thinking, note-taking, and deep work." />
    <meta name="author" content="Vault" />
    <meta property="og:title" content="Vault — A Thinking Environment" />
